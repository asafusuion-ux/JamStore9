{% load static %}
<section id="or-product-2" class="or-product-section-2" style="margin-bottom: 50px;">
    <div class="or-product-shop-content">
        <div class="container">
            <div style="text-align: center; margin-bottom: 40px;">
                <div style="display: inline-block; position: relative;">
                    <span style="
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #4CAF50;
            display: block;
            margin-bottom: 8px;
        ">— Featured —</span>
                    <h3 style="
            font-size: 42px;
            font-weight: 800;
            color: #1a1a1a;
            margin: 0;
            line-height: 1;
        ">🔥 Hot!</h3>
                    <div style="
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 2px;
            margin: 12px auto 0;
        "></div>
                </div>
            </div>
            <div class="row">
                {% for product in products %}
                <div class="col-lg-3 col-md-6">
                    <div class="or-product-innerbox-item type-1 text-center position-relative">
                        <div class="e-commerce-btn">
                            <a href="shop.html#"><i class="fal fa-shopping-cart"></i></a>
                            <a href="shop.html#"><i class="fal fa-heart"></i></a>
                            <a href="shop.html#"><i class="fal fa-eye"></i></a>
                        </div>
                        <div class="or-product-inner-img">
                            <img src="{{product.image.url}}" style="height: 180px; width: 230px;" alt="">
                        </div>
                        <div class="or-product-inner-text headline">
                            <h3><a href="shop-single.html" tabindex="0">{{product.name}}</a></h3>
                            <span class="price">{{product.price}}</span>
                            <div class="or-product-rate ul-li">
                                <ul>
                                    <li><i class="fas fa-star"></i></li>
                                    <li><i class="fas fa-star"></i></li>
                                    <li><i class="fas fa-star"></i></li>
                                    <li><i class="fas fa-star"></i></li>
                                    <li><i class="fas fa-star"></i></li>
                                </ul>
                            </div>
                        </div>
                        <div class="or-product-btn text-center">
                            <a class="d-flex justify-content-center align-items-center" href="shop.html#"
                                tabindex="0">Add To Cart</a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="or-pagination text-center ul-li">
                <ul>
                    <li><a class="active" href="shop.html#">1</a></li>
                    <li><a href="shop.html#">2</a></li>
                    <li><a href="shop.html#">3</a></li>
                </ul>
            </div>
        </div>
    </div>
</section>
