{% load static %}
<section id="or-product-2" class="or-product-section-2" style="margin-bottom: 50px;">
    <div class="container">
        <div class="or-product-content-2">
            <div class="row" style="height: 1200px;">
                <div class="col-lg-12">
                    <div class="or-product-content-wrapper-2">
                        {% for category in categories %}
                        <div class="or-product-top-content d-flex justify-content-between align-items-end">
                            <div class="or-section-title-2 headline">
                                <h2 class="mt-5">{{category.name}}</h2>
                            </div>
                            <div class="carousel_nav  clearfix">
                                <button type="button" class="or-pro2-left_arrow"><i
                                        class="far fa-chevron-left"></i></button>
                                <button type="button" class="or-pro2-right_arrow"><i
                                        class="far fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="or-product-item-slider-wrapper">
                            <div class="or-product-item-slider">
                                {% for product in category.products.all %}
                                <div class="organio-inner-item">
                                    <div class="or-product-item-2 text-center">
                                        <div class="or-product-img-btn position-relative">
                                            {% if product.image %}
                                            <div class="or-product-img">
                                                <a href="shop.html">
                                                    <img src="{{ product.image.url }}"
                                                        style="width: 300px; height: 200px;" alt="">
                                                </a>
                                            </div>
                                            {% else %}
                                            <a href="shop.html">
                                                <img src="{% static 'assets/img/category/h5-icon6.png' % }"
                                                    style="width: 300px;  height: 200px;" alt="">
                                            </a>
                                            {% endif %}
                                            <div class="price">
                                                <span class="discount-price">{{ product.price }} сом</span>
                                            </div>
                                            <div class="e-commerce-btn">
                                                <a href="index-2.html#"><i class="fal fa-shopping-cart"></i></a>
                                                <a href="index-2.html#"><i class="fal fa-heart"></i></a>
                                                <a href="index-2.html#"><i class="fal fa-eye"></i></a>
                                            </div>
                                        </div>
                                        <div class="or-product-text headline">
                                            <h3><a href="shop-single.html">{{ product.name }}</a></h3>
                                        </div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="col-lg-3">
                    <div class="or-product-add-banner">
                        <a href="shop.html">
                            <img src="assets/img/add.jpg" alt="">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
